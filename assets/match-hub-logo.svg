<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo degradado -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e91e63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2185b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f48fb1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e91e63;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo de fondo -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" />
  
  <!-- Círculo interno blanco -->
  <circle cx="100" cy="100" r="85" fill="#ffffff" opacity="0.1" />
  
  <!-- Símbolo central: dos puntos conectados (representan conexión/match) -->
  <circle cx="80" cy="95" r="12" fill="url(#accentGradient)" />
  <circle cx="120" cy="105" r="12" fill="url(#accentGradient)" />
  <line x1="92" y1="100" x2="108" y2="100" stroke="url(#accentGradient)" stroke-width="3" stroke-linecap="round" />
  
  <!-- Línea central para dividir módulos -->
  <circle cx="100" cy="100" r="65" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" />
  
  <!-- Módulo 1: PAREJA (Corazón - Arriba) -->
  <text x="100" y="45" text-anchor="middle" font-size="24" fill="#ffffff">💑</text>
  
  <!-- Módulo 2: FIESTA (Botella - Izquierda) -->
  <text x="35" y="110" text-anchor="middle" font-size="24" fill="#ffffff">🎉</text>
  
  <!-- Módulo 3: AVENTURA (Cohete - Derecha) -->
  <text x="165" y="110" text-anchor="middle" font-size="24" fill="#ffffff">🚀</text>
  
  <!-- Texto "Match Hub" en la parte inferior -->
  <text x="100" y="170" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff" font-family="Arial, sans-serif" letter-spacing="1">MATCH HUB</text>
</svg>